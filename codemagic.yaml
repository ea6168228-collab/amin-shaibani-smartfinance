workflows:
  android-capacitor:
    name: Android Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      node: 22

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor Android
        script: npx cap sync android

      - name: Fix gradlew permission
        script: chmod +x android/gradlew

      - name: Build APK & AAB
        script: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease bundleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - ea6168228@gmail.com
        notify:
          success: true
          failure: true
