scripts:
  - name: Install dependencies
    script: npm install

  - name: Build web app
    script: npm run build

  - name: Verify build output
    script: ls dist

  - name: Sync Capacitor Android
    script: npx cap sync android

  - name: Build Android APK
    script: |
      cd android
      chmod +x gradlew
      ./gradlew assembleDebug
